name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon package
        run: |
          mkdir -p package/FUR
          cp FUR.toc package/FUR/
          cp FUR.lua package/FUR/
          cd package
          zip -r ../FUR.zip FUR

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: FUR
          path: FUR.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FUR.zip
